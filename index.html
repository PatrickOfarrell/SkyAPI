<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyblock Data Hub</title>
    <style>
        :root {
            --bg: #0b0b0e;
            --surface: #14141c;
            --accent: #55ffff;
            --gold: #ffaa00;
            --text: #ffffff;
            --muted: #70708a;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 550px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 14px;
            background: var(--surface);
            border: 1px solid #252538;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        button {
            padding: 14px 28px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #252538;
            display: none;
        }

        .profile-title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #252538;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .level-badge {
            background: #ff5555;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .stat-grid {
            display: grid;
            gap: 12px;
        }

        .grid-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 6px;
        }

        .label { color: var(--muted); }
        .val { color: var(--accent); font-weight: 600; }
        #error { color: #ff5555; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="search-container">
        <input type="text" id="username" placeholder="Minecraft Character Name...">
        <button id="search-btn" onclick="fetchProfile()">Search</button>
    </div>

    <div id="error"></div>

    <div class="card" id="profile-card">
        <div class="profile-title-wrapper">
            <div>
                <h2 id="player-name" style="margin:0; color:var(--gold);">Player</h2>
                <span id="profile-tag" style="font-size:0.8rem; color:var(--muted);">Profile: None</span>
            </div>
            <div class="level-badge">Lvl <span id="sb-level">0</span></div>
        </div>

        <div class="stat-grid">
            <div class="grid-item"><span class="label">Purse Coins</span><span class="val" id="purse-val">0</span></div>
            <div class="grid-item"><span class="label">Bank Balance</span><span class="val" id="bank-val">0</span></div>
            <div class="grid-item"><span class="label">Active Pets Loaded</span><span class="val" id="pets-val">0</span></div>
            <div class="grid-item"><span class="label">Inventory Accessible</span><span class="val" id="inv-status">No</span></div>
        </div>
    </div>
</div>

<script>
    // Make sure to replace this URL with your actual Cloudflare worker deployment URL
    const WORKER_URL = 'https://skyblock-api-proxy.30-hertz.workers.dev';

    async function fetchProfile() {
        const user = document.getElementById('username').value.trim();
        const errBox = document.getElementById('error');
        const card = document.getElementById('profile-card');
        const btn = document.getElementById('search-btn');

        errBox.innerText = "";
        if (!user) return;

        btn.disabled = true;
        btn.innerText = "Loading...";

        try {
            const workerRes = await fetch(`${WORKER_URL}?username=${user}`);
            const sbData = await workerRes.json();
            
            if (!workerRes.ok) {
                throw new Error(sbData.error || "Failed to retrieve profile data.");
            }

            document.getElementById('player-name').innerText = sbData.name;
            document.getElementById('profile-tag').innerText = `Profile: ${sbData.profileName} (${sbData.gameMode})`;
            document.getElementById('sb-level').innerText = Math.floor(sbData.skyblockLevel);
            document.getElementById('purse-val').innerText = sbData.purse.toLocaleString();
            document.getElementById('bank-val').innerText = sbData.bank.toLocaleString();
            document.getElementById('pets-val').innerText = sbData.petsCount;
            document.getElementById('inv-status').innerText = sbData.hasInventoryData ? "Yes" : "API Off";

            card.style.display = 'block';
        } catch (e) {
            card.style.display = 'none';
            errBox.innerText = e.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Search";
        }
    }

    document.getElementById('username').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchProfile();
    });
</script>

</body>
</html>
